version: '3.9'

services:

  redis:
    image: redis:7-alpine
    container_name: xeno_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"    # bind to localhost only — NOT reachable from public internet
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: xeno_backend
    restart: always
    ports:
      - "0.0.0.0:8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/xeno_oracle.db
      - DATABASE_URL_SYNC=sqlite:////app/data/xeno_oracle.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CHANNEL_SERVICE_URL=http://channel-service:8001
      - CRM_CALLBACK_URL=http://backend:8000/api/v1/campaigns/callbacks
    volumes:
      - sqlite_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  channel-service:
    build:
      context: ./channel-service
      dockerfile: Dockerfile.channel
    container_name: xeno_channel
    restart: always
    ports:
      - "0.0.0.0:8001:8001"
    env_file: .env
    environment:
      - CRM_CALLBACK_URL=http://backend:8000/api/v1/campaigns/callbacks
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=http://3.87.12.186:8000
    container_name: xeno_frontend
    restart: always
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://3.87.12.186:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  sqlite_data:
    driver: local
